<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="280" height="80" rx="16" fill="url(#bg)"/>

  <!-- Leaf -->
  <path d="M38 22 Q50 8 62 18 Q58 24 52 26 Q48 20 38 22Z" fill="url(#leaf)"/>

  <!-- Fruit body (orange/citrus) -->
  <circle cx="42" cy="44" r="18" fill="#ffa726"/>
  <circle cx="42" cy="44" r="14" fill="#ffb74d"/>
  <circle cx="42" cy="44" r="8" fill="#ffcc80"/>

  <!-- Fruit highlight -->
  <ellipse cx="36" cy="38" rx="4" ry="5" fill="#fff" opacity=".35"/>

  <!-- Stem -->
  <path d="M42 26 Q44 22 48 20" fill="none" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small leaf on stem -->
  <path d="M46 22 Q50 18 52 22 Q48 24 46 22Z" fill="#81c784"/>

  <!-- Text -->
  <text x="80" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#fff" letter-spacing="1">Fruit</text>
  <text x="80" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#c8e6c9" letter-spacing="2">SHOP</text>

  <!-- Decorative dots -->
  <circle cx="215" cy="28" r="2" fill="#a5d6a7" opacity=".6"/>
  <circle cx="230" cy="35" r="1.5" fill="#a5d6a7" opacity=".4"/>
  <circle cx="220" cy="55" r="2.5" fill="#a5d6a7" opacity=".5"/>
</svg>